<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily News Earn</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
background:#f1f1f1;
margin:0;
}

header{
background:#e60023;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
text-align:center;
}

.points{
background:white;
padding:10px;
text-align:center;
font-size:18px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

#news{
padding:10px;
}

.card{
background:white;
border-radius:10px;
margin-bottom:15px;
overflow:hidden;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h3{
padding:10px;
margin:0;
}

.card p{
padding:0 10px 10px;
color:#555;
font-size:14px;
}

.read{
background:#e60023;
color:white;
border:none;
padding:10px;
width:100%;
cursor:pointer;
font-size:16px;
}

</style>
</head>

<body>

<header>
Daily News Earn
</header>

<div class="points">
⭐ Points: <span id="points">0</span>
</div>

<div id="news">
Loading news...
</div>

<script>

const API_KEY = "99b65368f09edc9972c44f8b9daf6106";

const url = "https://gnews.io/api/v4/top-headlines?country=in&lang=en&apikey=" + API_KEY;

// CORS FIX
const API = "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);

let points = localStorage.getItem("points") || 0;
document.getElementById("points").innerText = points;

function addPoints(){
points = parseInt(points) + 5;
localStorage.setItem("points",points);
document.getElementById("points").innerText = points;
}

function readNews(link){
addPoints();
window.open(link,"_blank");
}

fetch(API)
.then(res=>res.json())
.then(data=>{

let html="";

data.articles.forEach(n=>{

html+=`

<div class="card">

<img src="${n.image || 'https://via.placeholder.com/400x200'}">

<h3>${n.title}</h3>

<p>${n.description || ""}</p>

<button class="read" onclick="readNews('${n.url}')">
Read & Earn +5
</button>

</div>

`;

});

document.getElementById("news").innerHTML = html;

})
.catch(err=>{
document.getElementById("news").innerHTML="Failed to load news.";
console.log(err);
});

</script>

</body>
</html>
