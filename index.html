<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>News & Earn</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#111;
color:white;
padding:15px;
text-align:center;
}

.container{
padding:20px;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px 15px;
background:#007bff;
border:none;
color:white;
cursor:pointer;
border-radius:5px;
}

.card{
background:white;
padding:15px;
margin:10px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

#news{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.points{
position:fixed;
right:20px;
top:20px;
background:black;
color:white;
padding:10px;
border-radius:5px;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<header>
<h1>📰 News & Earn Website</h1>
</header>

<div class="points">
Points: <span id="points">0</span>
</div>

<div class="container">

<div id="auth">

<h2>Signup</h2>

<input id="signupEmail" placeholder="Email">
<input id="signupPassword" type="password" placeholder="Password">

<button onclick="signup()">Signup</button>

<h2>Login</h2>

<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div id="newsSection" class="hidden">

<h2>Latest News</h2>

<div id="news"></div>

</div>

</div>

<script>

const apiKey="1020c7f732b74f6bb1b788221bc8cc99"

let user=JSON.parse(localStorage.getItem("user"))

if(user){

document.getElementById("auth").style.display="none"
document.getElementById("newsSection").classList.remove("hidden")
document.getElementById("points").innerText=user.points

loadNews()

}

function signup(){

let email=document.getElementById("signupEmail").value
let password=document.getElementById("signupPassword").value

let user={
email:email,
password:password,
points:0
}

localStorage.setItem("user",JSON.stringify(user))

alert("Account created!")

}

function login(){

let email=document.getElementById("loginEmail").value
let password=document.getElementById("loginPassword").value

let user=JSON.parse(localStorage.getItem("user"))

if(user && user.email==email && user.password==password){

alert("Login success")

document.getElementById("auth").style.display="none"
document.getElementById("newsSection").classList.remove("hidden")

document.getElementById("points").innerText=user.points

loadNews()

}else{

alert("Wrong login")

}

}

async function loadNews(){

let res=await fetch(`https://newsapi.org/v2/top-headlines?country=in&apiKey=${apiKey}`)

let data=await res.json()

let container=document.getElementById("news")

data.articles.forEach(article=>{

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<h3>${article.title}</h3>

<p>${article.description || ""}</p>

<a href="${article.url}" target="_blank">

<button onclick="earn()">Read & Earn</button>

</a>

`

container.appendChild(card)

})

}

function earn(){

let user=JSON.parse(localStorage.getItem("user"))

user.points+=5

localStorage.setItem("user",JSON.stringify(user))

document.getElementById("points").innerText=user.points

alert("You earned 5 points!")

}

</script>

</body>
</html>
