<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>News & Earn</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#111;
color:white;
padding:15px;
text-align:center;
}

nav{
margin-top:10px;
}

nav button{
margin:5px;
padding:8px 12px;
border:none;
background:#007bff;
color:white;
border-radius:5px;
cursor:pointer;
}

#search{
padding:10px;
width:250px;
margin-top:10px;
}

.points{
position:fixed;
top:20px;
right:20px;
background:black;
color:white;
padding:10px;
border-radius:5px;
}

#news{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card h3{
padding:10px;
font-size:18px;
}

.card p{
padding:0 10px 10px;
}

.card button{
margin:10px;
background:#28a745;
border:none;
color:white;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
}

footer{
text-align:center;
padding:20px;
background:#222;
color:white;
}

</style>
</head>

<body>

<header>

<h1>📰 News & Earn Website</h1>

<input id="search" placeholder="Search news...">

<nav>
<button onclick="getNews('general')">General</button>
<button onclick="getNews('technology')">Technology</button>
<button onclick="getNews('sports')">Sports</button>
<button onclick="getNews('business')">Business</button>
<button onclick="getNews('health')">Health</button>
</nav>

</header>

<div class="points">
Points: <span id="points">0</span>
</div>

<div id="news"></div>

<footer>
© 2026 News & Earn Website
</footer>

<script>

const apiKey="1020c7f732b74f6bb1b788221bc8cc99"

let points=localStorage.getItem("points") || 0
document.getElementById("points").innerText=points

async function getNews(category="general"){

const url=`https://corsproxy.io/?https://newsapi.org/v2/top-headlines?country=in&category=${category}&apiKey=${apiKey}`

const res=await fetch(url)

const data=await res.json()

displayNews(data.articles)

}

function displayNews(articles){

const container=document.getElementById("news")

container.innerHTML=""

articles.forEach(article=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="${article.urlToImage || 'https://via.placeholder.com/300'}">

<h3>${article.title}</h3>

<p>${article.description || ""}</p>

<a href="${article.url}" target="_blank">

<button onclick="earn()">Read & Earn</button>

</a>

`

container.appendChild(card)

})

}

function earn(){

points=parseInt(points)+5

localStorage.setItem("points",points)

document.getElementById("points").innerText=points

}

document.getElementById("search").addEventListener("keyup", async function(){

let query=this.value

if(query.length<3) return

const url=`https://corsproxy.io/?https://newsapi.org/v2/everything?q=${query}&sortBy=publishedAt&apiKey=${apiKey}`

const res=await fetch(url)

const data=await res.json()

displayNews(data.articles)

})

getNews()

</script>

</body>
</html>
