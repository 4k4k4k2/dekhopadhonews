<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily News Earn</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
background:#f1f1f1;
margin:0;
}

header{
background:#e60023;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
text-align:center;
}

.points{
background:white;
padding:10px;
text-align:center;
font-size:18px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

#news{
padding:10px;
}

.card{
background:white;
border-radius:10px;
margin-bottom:15px;
overflow:hidden;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
cursor:pointer;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h3{
padding:10px;
font-size:18px;
margin:0;
}

.card p{
padding:0 10px 10px 10px;
color:#555;
font-size:14px;
}

.read{
background:#e60023;
color:white;
border:none;
padding:10px;
width:100%;
font-size:16px;
cursor:pointer;
}

.read:hover{
background:#c4001d;
}

</style>
</head>

<body>

<header>
Daily News Earn
</header>

<div class="points">
⭐ Points: <span id="points">0</span>
</div>

<div id="news">
Loading news...
</div>

<script>

const API_KEY = "99b65368f09edc9972c44f8b9daf6106";
const URL = `https://gnews.io/api/v4/top-headlines?country=in&lang=en&apikey=${API_KEY}`;

let points = localStorage.getItem("points") || 0;
document.getElementById("points").innerText = points;

function addPoints(){

points = parseInt(points) + 5;

localStorage.setItem("points", points);

document.getElementById("points").innerText = points;

}

fetch(URL)
.then(res=>res.json())
.then(data=>{

let html="";

data.articles.forEach((news,i)=>{

html += `
<div class="card">

<img src="${news.image}" onerror="this.src='https://via.placeholder.com/400x200'">

<h3>${news.title}</h3>

<p>${news.description || ""}</p>

<button class="read" onclick="readNews('${news.url}')">
Read & Earn +5
</button>

</div>
`;

});

document.getElementById("news").innerHTML = html;

});

function readNews(url){

addPoints();

window.open(url,"_blank");

}

</script>

</body>
</html>
