<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DekhoPadho News</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:system-ui;
margin:0;
background:#f2f2f2;
}

header{
background:#ff0033;
color:white;
padding:14px;
font-size:22px;
font-weight:bold;
text-align:center;
}

.topbar{
display:flex;
justify-content:space-between;
padding:10px;
background:white;
align-items:center;
}

.points{
font-weight:bold;
}

button{
cursor:pointer;
border:none;
border-radius:6px;
padding:8px 12px;
}

.bonus{background:#ffaa00;color:white}
.withdraw{background:#2ecc71;color:white}

.categories{
display:flex;
overflow:auto;
background:white;
padding:8px;
gap:8px;
}

.cat{
background:#eee;
padding:6px 12px;
border-radius:20px;
white-space:nowrap;
font-size:14px;
}

.cat.active{
background:#ff0033;
color:white;
}

#news{
padding:10px;
}

.card{
background:white;
margin-bottom:12px;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card h3{
padding:10px;
margin:0;
font-size:18px;
}

.card p{
padding:0 10px 10px;
color:#555;
font-size:14px;
}

.read{
background:#ff0033;
color:white;
width:100%;
padding:10px;
}

.footer{
text-align:center;
padding:15px;
color:#888;
}

</style>
</head>

<body>

<header>DekhoPadho News</header>

<div class="topbar">

<div class="points">
⭐ Points: <span id="points">0</span>
</div>

<div>
<button class="bonus" onclick="dailyBonus()">Daily Bonus</button>
<button class="withdraw" onclick="withdraw()">Withdraw</button>
</div>

</div>

<div class="categories" id="cats"></div>

<div id="news">Loading news...</div>

<div class="footer">
Read news & earn rewards
</div>

<script>

const API_KEY="99b65368f09edc9972c44f8b9daf6106"

const categories=[
"general","business","technology","sports","health","entertainment","science"
]

let current="general"

let points=localStorage.getItem("points")||0

document.getElementById("points").innerText=points


function renderCategories(){

let html=""

categories.forEach(c=>{

html+=`<div class="cat ${c==current?'active':''}" onclick="loadNews('${c}')">${c}</div>`

})

document.getElementById("cats").innerHTML=html

}

renderCategories()


function addPoints(){

points=parseInt(points)+5

localStorage.setItem("points",points)

document.getElementById("points").innerText=points

}


function readNews(url){

addPoints()

window.open(url,"_blank")

}


function loadNews(cat){

current=cat

renderCategories()

document.getElementById("news").innerHTML="Loading..."

const url=`https://gnews.io/api/v4/top-headlines?country=in&topic=${cat}&apikey=${API_KEY}`

const api="https://api.allorigins.win/raw?url="+encodeURIComponent(url)

fetch(api)

.then(r=>r.json())

.then(data=>{

let html=""

data.articles.forEach(n=>{

html+=`

<div class="card">

<img src="${n.image||'https://via.placeholder.com/400'}">

<h3>${n.title}</h3>

<p>${n.description||""}</p>

<button class="read" onclick="readNews('${n.url}')">Read & Earn +5</button>

</div>

`

})

document.getElementById("news").innerHTML=html

})

}

loadNews(current)


/* DAILY BONUS */

function dailyBonus(){

let last=localStorage.getItem("bonusDate")

let today=new Date().toDateString()

if(last==today){

alert("Daily bonus already claimed")

return

}

points=parseInt(points)+50

localStorage.setItem("points",points)

localStorage.setItem("bonusDate",today)

document.getElementById("points").innerText=points

alert("🎁 You received 50 points!")

}


/* WITHDRAW */

function withdraw(){

if(points<10000){

alert("Need 10000 points to withdraw ₹10")

return

}

let upi=prompt("Enter Paytm / UPI ID")

if(!upi) return

points-=10000

localStorage.setItem("points",points)

document.getElementById("points").innerText=points

alert("Withdraw request sent for ₹10 to "+upi)

}


/* AUTO NEWS REFRESH */

setInterval(()=>{

loadNews(current)

},300000)

</script>

</body>
</html>
