<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>News & Earn</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#111;
color:white;
padding:15px;
text-align:center;
}

#news{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

button{
background:#007bff;
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
}

.points{
position:fixed;
right:20px;
top:20px;
background:black;
color:white;
padding:10px;
border-radius:5px;
}
</style>
</head>

<body>

<header>
<h1>📰 News & Earn Website</h1>
</header>

<div class="points">
Points: <span id="points">0</span>
</div>

<h2 style="padding-left:20px;">Latest News</h2>

<div id="news"></div>

<script>

const apiKey="1020c7f732b74f6bb1b788221bc8cc99"

let points=localStorage.getItem("points") || 0
document.getElementById("points").innerText=points

async function loadNews(){

const url=`https://corsproxy.io/?https://newsapi.org/v2/top-headlines?country=in&apiKey=${apiKey}`

const res=await fetch(url)

const data=await res.json()

const container=document.getElementById("news")

data.articles.forEach(article=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<h3>${article.title}</h3>

<p>${article.description || ""}</p>

<a href="${article.url}" target="_blank">

<button onclick="earn()">Read & Earn</button>

</a>

`

container.appendChild(card)

})

}

function earn(){

points=parseInt(points)+5

localStorage.setItem("points",points)

document.getElementById("points").innerText=points

}

loadNews()

</script>

</body>
</html>
