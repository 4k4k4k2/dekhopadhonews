<script>

const apiKey = "99b65368f09edc9972c44f8b9daf6106"

let points = localStorage.getItem("points") || 0
document.getElementById("points").innerText = points

async function loadNews(){

const container = document.getElementById("news")
container.innerHTML = "Loading news..."

try{

const url = `https://gnews.io/api/v4/top-headlines?country=in&lang=en&max=10&apikey=${apiKey}`

const res = await fetch(url)
const data = await res.json()

if(!data.articles){
container.innerHTML="API limit reached or invalid key"
return
}

displayNews(data.articles)

}catch(e){

container.innerHTML="Error loading news"

}

}

function displayNews(articles){

const container = document.getElementById("news")
container.innerHTML=""

articles.forEach(article=>{

const card = document.createElement("div")
card.className="card"

card.innerHTML = `

<img src="${article.image || 'https://via.placeholder.com/300'}">

<h3>${article.title}</h3>

<p>${article.description || ""}</p>

<a href="${article.url}" target="_blank">

<button onclick="earn()">Read & Earn</button>

</a>

`

container.appendChild(card)

})

}

function earn(){

points = parseInt(points) + 5

localStorage.setItem("points", points)

document.getElementById("points").innerText = points

}

loadNews()

</script>
