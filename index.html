<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>News Reader</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
margin:0;
}

header{
background:#222;
color:white;
padding:15px;
text-align:center;
}

#news-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.card img{
width:100%;
border-radius:5px;
}

.card h3{
font-size:18px;
}

button{
background:#007BFF;
color:white;
border:none;
padding:10px;
cursor:pointer;
border-radius:5px;
}

.points{
position:fixed;
top:10px;
right:20px;
background:black;
color:white;
padding:10px;
border-radius:5px;
}

</style>
</head>

<body>

<header>
<h1>📰 News & Earn</h1>
</header>

<div class="points">
Points: <span id="points">0</span>
</div>

<div id="news-container"></div>

<script>

const apiKey = "1020c7f732b74f6bb1b788221bc8cc99";
let points = 0;

async function loadNews(){

const url = `https://newsapi.org/v2/top-headlines?country=in&apiKey=${apiKey}`;

const res = await fetch(url);
const data = await res.json();

const container = document.getElementById("news-container");

data.articles.forEach(article => {

const card = document.createElement("div");
card.className="card";

card.innerHTML = `
<img src="${article.urlToImage || ''}">
<h3>${article.title}</h3>
<p>${article.description || ''}</p>
<a href="${article.url}" target="_blank">
<button onclick="earn()">Read & Earn</button>
</a>
`;

container.appendChild(card);

});

}

function earn(){
points += 5;
document.getElementById("points").innerText = points;
}

loadNews();

</script>

</body>
</html>
