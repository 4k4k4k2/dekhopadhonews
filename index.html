<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>News & Earn</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#111;
color:white;
text-align:center;
padding:20px;
}

.points{
position:fixed;
top:20px;
right:20px;
background:black;
color:white;
padding:10px;
border-radius:5px;
}

#news{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card h3{
padding:10px;
}

.card p{
padding:0 10px 10px;
}

.card button{
margin:10px;
padding:8px 12px;
background:#28a745;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<header>

<h1>📰 News & Earn Website</h1>

<input id="search" placeholder="Search news..." style="padding:10px;width:250px">

</header>

<div class="points">
Points: <span id="points">0</span>
</div>

<div id="news"></div>

<script>

const apiKey="99b65368f09edc9972c44f8b9daf6106"

let points = localStorage.getItem("points") || 0
document.getElementById("points").innerText = points

async function loadNews(){

const url=`https://gnews.io/api/v4/top-headlines?lang=en&country=in&max=20&apikey=${apiKey}`

const res = await fetch(url)
const data = await res.json()

displayNews(data.articles)

}

function displayNews(articles){

const container=document.getElementById("news")

container.innerHTML=""

articles.forEach(article=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="${article.image || 'https://via.placeholder.com/300'}">

<h3>${article.title}</h3>

<p>${article.description || ""}</p>

<a href="${article.url}" target="_blank">

<button onclick="earn()">Read & Earn</button>

</a>

`

container.appendChild(card)

})

}

document.getElementById("search").addEventListener("keyup", async function(){

let q=this.value

if(q.length<3) return

const url=`https://gnews.io/api/v4/search?q=${q}&lang=en&max=20&apikey=${apiKey}`

const res=await fetch(url)

const data=await res.json()

displayNews(data.articles)

})

function earn(){

points=parseInt(points)+5

localStorage.setItem("points",points)

document.getElementById("points").innerText=points

}

loadNews()

</script>

</body>
</html>
